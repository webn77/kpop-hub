{% extends "base.html" %}

{% block title %}일정 등록 — KPOP HUB{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">

  <a href="{% url 'events:list' %}" class="text-sm text-purple-600 hover:underline">← 이벤트 목록</a>

  <div class="bg-white rounded-xl shadow-sm p-6 mt-4">
    <h1 class="text-xl font-bold text-purple-700 mb-6">일정 등록</h1>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}"
                 class="block text-sm font-medium text-gray-700 mb-1">
            {{ field.label }}
            {% if field.field.required %}<span class="text-red-500">*</span>{% endif %}
          </label>
          <div class="[&_input]:w-full [&_input]:border [&_input]:border-gray-300 [&_input]:rounded-lg
                      [&_input]:px-3 [&_input]:py-2 [&_input]:text-sm [&_input]:focus:outline-none
                      [&_input]:focus:ring-2 [&_input]:focus:ring-purple-400
                      [&_select]:w-full [&_select]:border [&_select]:border-gray-300 [&_select]:rounded-lg
                      [&_select]:px-3 [&_select]:py-2 [&_select]:text-sm [&_select]:focus:outline-none
                      [&_select]:focus:ring-2 [&_select]:focus:ring-purple-400
                      [&_textarea]:w-full [&_textarea]:border [&_textarea]:border-gray-300 [&_textarea]:rounded-lg
                      [&_textarea]:px-3 [&_textarea]:py-2 [&_textarea]:text-sm [&_textarea]:focus:outline-none
                      [&_textarea]:focus:ring-2 [&_textarea]:focus:ring-purple-400">
            {{ field }}
          </div>
          {% if field.errors %}
            {% for error in field.errors %}
              <p class="text-xs text-red-500 mt-1">{{ error }}</p>
            {% endfor %}
          {% endif %}
        </div>
      {% endfor %}

      <div class="pt-2">
        <button type="submit"
                class="w-full bg-purple-600 text-white py-2 rounded-lg font-medium hover:bg-purple-700 transition">
          등록하기
        </button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
