{% extends 'base.html' %}

{% block title %}로그인 — KPOP HUB{% endblock %}

{% block content %}
<div class="flex justify-center items-start pt-8">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg overflow-hidden">

    <!-- 카드 헤더 -->
    <div class="bg-violet-600 px-8 py-6 text-center">
      <h1 class="text-2xl font-bold text-white">로그인</h1>
      <p class="text-violet-200 text-sm mt-1">KPOP HUB에 오신 것을 환영합니다</p>
    </div>

    <!-- 카드 바디 -->
    <form method="post" class="px-8 py-6 space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">아이디</label>
        <input
          type="text"
          name="username"
          required
          autofocus
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent"
          placeholder="아이디를 입력하세요"
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
        <input
          type="password"
          name="password"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent"
          placeholder="비밀번호를 입력하세요"
        >
      </div>

      <button
        type="submit"
        class="w-full bg-violet-600 hover:bg-violet-700 text-white font-semibold py-2 rounded-lg transition"
      >
        로그인
      </button>
    </form>

    <!-- 카드 푸터 -->
    <div class="px-8 pb-6 text-center text-sm text-gray-500">
      계정이 없으신가요?
      <a href="{% url 'accounts:signup' %}" class="text-violet-600 hover:underline font-medium">회원가입</a>
    </div>

  </div>
</div>
{% endblock %}
