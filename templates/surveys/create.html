{% extends "base.html" %}

{% block title %}새 설문 만들기 — KPOP HUB{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">새 설문 만들기</h1>

  <form method="post" id="survey-form" class="space-y-6">
    {% csrf_token %}

    <!-- 기본 정보 -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 space-y-4">
      <h2 class="font-semibold text-gray-700">기본 정보</h2>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">제목 <span class="text-red-500">*</span></label>
        {{ form.title }}
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">설명</label>
        {{ form.description }}
      </div>
      <div class="flex gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">마감일</label>
          {{ form.expires_at }}
        </div>
        <div class="flex items-center gap-2 mt-6">
          {{ form.is_anonymous }}
          <label class="text-sm text-gray-700">익명 응답</label>
        </div>
      </div>
    </div>

    <!-- 질문 목록 -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-gray-700">질문</h2>
        <button type="button" id="add-question-btn"
          class="text-sm bg-purple-100 text-purple-700 px-3 py-1 rounded hover:bg-purple-200 transition">
          + 질문 추가
        </button>
      </div>
      <div id="questions-container" class="space-y-4">
        <!-- JS로 질문 추가 -->
      </div>
    </div>

    <div class="flex gap-3">
      <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded hover:bg-purple-700 transition font-medium">설문 생성</button>
      <a href="{% url 'surveys:list' %}" class="bg-gray-100 text-gray-700 px-4 py-2 rounded hover:bg-gray-200 transition">취소</a>
    </div>
  </form>
</div>

<!-- 질문 템플릿 (hidden) -->
<template id="question-template">
  <div class="question-row border border-gray-200 rounded p-4 space-y-3">
    <div class="flex items-center justify-between">
      <span class="text-sm font-medium text-gray-600 question-num">질문 1</span>
      <button type="button" class="remove-question-btn text-red-400 hover:text-red-600 text-sm">삭제</button>
    </div>
    <div>
      <label class="block text-xs text-gray-500 mb-1">질문 내용</label>
      <input type="text" name="question_text_PLACEHOLDER"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300"
        placeholder="질문을 입력하세요" required>
    </div>
    <div class="flex gap-4">
      <div class="flex-1">
        <label class="block text-xs text-gray-500 mb-1">유형</label>
        <select name="question_type_PLACEHOLDER"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none question-type-select">
          <option value="TEXT">주관식 단답</option>
          <option value="TEXTAREA">주관식 장문</option>
          <option value="CHOICE">객관식 단일</option>
          <option value="MULTIPLE">객관식 복수</option>
          <option value="SCALE">척도 1-5</option>
        </select>
      </div>
    </div>
    <div class="options-area hidden">
      <label class="block text-xs text-gray-500 mb-1">선택지 (한 줄에 하나씩)</label>
      <textarea name="question_options_PLACEHOLDER" rows="3"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300"
        placeholder="선택지1&#10;선택지2&#10;선택지3"></textarea>
    </div>
  </div>
</template>
{% endblock %}

{% block extra_scripts %}
<script>
  let questionCount = 0;
  const container = document.getElementById('questions-container');
  const template = document.getElementById('question-template');

  function addQuestion() {
    const idx = questionCount++;
    const clone = template.content.cloneNode(true);

    // placeholder 치환
    clone.querySelectorAll('[name]').forEach(el => {
      el.name = el.name.replace('PLACEHOLDER', idx);
    });
    clone.querySelector('.question-num').textContent = `질문 ${idx + 1}`;

    // 유형 변경 시 선택지 영역 토글
    const typeSelect = clone.querySelector('.question-type-select');
    const optionsArea = clone.querySelector('.options-area');
    typeSelect.addEventListener('change', () => {
      if (['CHOICE', 'MULTIPLE'].includes(typeSelect.value)) {
        optionsArea.classList.remove('hidden');
      } else {
        optionsArea.classList.add('hidden');
      }
    });

    // 삭제 버튼
    clone.querySelector('.remove-question-btn').addEventListener('click', function () {
      this.closest('.question-row').remove();
      updateNumbers();
    });

    container.appendChild(clone);
  }

  function updateNumbers() {
    container.querySelectorAll('.question-num').forEach((el, i) => {
      el.textContent = `질문 ${i + 1}`;
    });
  }

  document.getElementById('add-question-btn').addEventListener('click', addQuestion);

  // 초기 질문 1개
  addQuestion();
</script>
{% endblock %}
