{% extends "base.html" %}

{% block title %}{% if form.instance.pk %}공지 수정{% else %}공지 작성{% endif %} — KPOP HUB{% endblock %}

{% block content %}
<div class="bg-white border rounded-lg shadow-sm p-6 max-w-2xl mx-auto">
  <h1 class="text-xl font-bold text-purple-700 mb-4">
    {% if form.instance.pk %}공지 수정{% else %}새 공지 작성{% endif %}
  </h1>

  <form method="post" class="space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">제목</label>
      {{ form.title.errors }}
      <input type="text" name="title" value="{{ form.title.value|default:'' }}"
             class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400"
             maxlength="200" required>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">내용</label>
      {{ form.content.errors }}
      <textarea name="content" rows="10"
                class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400"
                required>{{ form.content.value|default:'' }}</textarea>
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_pinned" id="is_pinned"
             {% if form.is_pinned.value %}checked{% endif %}
             class="rounded border-gray-300 text-purple-600">
      <label for="is_pinned" class="text-sm text-gray-700">상단 고정</label>
    </div>

    <div class="flex gap-2 pt-2">
      <button type="submit"
              class="px-5 py-2 bg-purple-700 text-white rounded hover:bg-purple-800 transition text-sm">
        저장
      </button>
      <a href="{% url 'notices:list' %}"
         class="px-5 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition text-sm">
        취소
      </a>
    </div>
  </form>
</div>
{% endblock %}
