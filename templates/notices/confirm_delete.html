{% extends "base.html" %}

{% block title %}공지 삭제 확인 — KPOP HUB{% endblock %}

{% block content %}
<div class="bg-white border rounded-lg shadow-sm p-6 max-w-md mx-auto text-center space-y-4">
  <h1 class="text-xl font-bold text-red-600">공지사항 삭제</h1>
  <p class="text-gray-700">
    <span class="font-semibold">{{ object.title }}</span> 을(를) 삭제하시겠습니까?<br>
    <span class="text-sm text-gray-400">이 작업은 되돌릴 수 없습니다.</span>
  </p>
  <form method="post" class="flex justify-center gap-3">
    {% csrf_token %}
    <button type="submit"
            class="px-5 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition text-sm">삭제</button>
    <a href="{% url 'notices:detail' object.pk %}"
       class="px-5 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition text-sm">취소</a>
  </form>
</div>
{% endblock %}
